<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBCC Skill Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 60px 80px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 700px;
            width: 100%;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 60px;
            margin-bottom: 15px;
            display: block;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 20px;
            color: #555;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .status-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            margin: 20px 0;
            border-left: 4px solid #667eea;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .status-item:last-child {
            border-bottom: none;
        }

        .status-label {
            color: #555;
            font-weight: 500;
        }

        .status-value {
            font-weight: 600;
            color: #333;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .status-badge.online {
            background: #d4edda;
            color: #155724;
        }

        .status-badge.offline {
            background: #f8d7da;
            color: #721c24;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 30px 0;
        }

        .feature {
            background: #f8f9fa;
            padding: 20px 10px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .feature:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .feature-icon {
            font-size: 30px;
            display: block;
            margin-bottom: 8px;
        }

        .feature-text {
            font-size: 14px;
            color: #555;
            font-weight: 500;
        }

        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
            color: #888;
            font-size: 14px;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 32px;
            }

            .features {
                grid-template-columns: 1fr;
            }

            .logo {
                font-size: 45px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="logo">🚀</span>
        <h1>Welcome to BBCC Skill Hub</h1>
        <p class="subtitle">Empowering Skills, Building Futures</p>

        <div class="status-card">
            <div class="status-item">
                <span class="status-label">🟢 Server Status</span>
                <span class="status-value">
                    <span class="status-badge online" id="serverStatus">Online</span>
                </span>
            </div>
            <div class="status-item">
                <span class="status-label">🗄️ Database Status</span>
                <span class="status-value">
                    <span id="dbStatus">
                        <span class="loading"></span> Connecting...
                    </span>
                </span>
            </div>
            <div class="status-item">
                <span class="status-label">⏰ Server Time</span>
                <span class="status-value" id="serverTime">Loading...</span>
            </div>
        </div>

        <div class="features">
            <div class="feature">
                <span class="feature-icon">📚</span>
                <span class="feature-text">Student Management</span>
            </div>
            <div class="feature">
                <span class="feature-icon">👨‍🏫</span>
                <span class="feature-text">Teacher Portal</span>
            </div>
            <div class="feature">
                <span class="feature-icon">📊</span>
                <span class="feature-text">Analytics Dashboard</span>
            </div>
        </div>

        <div class="footer">
            <p>© 2026 <a href="#">BBCC Skill Hub</a> | All Rights Reserved</p>
        </div>
    </div>

    <script>
        // Update Server Time
        function updateTime() {
            const now = new Date();
            document.getElementById('serverTime').textContent = now.toLocaleString('en-IN', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            });
        }
        updateTime();
        setInterval(updateTime, 1000);

        // Check Database Status
        async function checkDatabase() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                const dbStatus = document.getElementById('dbStatus');
                if (data.database === 'Connected') {
                    dbStatus.innerHTML = '<span class="status-badge online">✅ Connected</span>';
                } else {
                    dbStatus.innerHTML = '<span class="status-badge offline">❌ Disconnected</span>';
                }
            } catch (error) {
                document.getElementById('dbStatus').innerHTML = '<span class="status-badge offline">❌ Connection Failed</span>';
            }
        }

        // Check status on load
        checkDatabase();
        // Check every 30 seconds
        setInterval(checkDatabase, 30000);
    </script>
</body>
</html>
